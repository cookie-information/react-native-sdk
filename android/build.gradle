plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

group = 'com.cookieinformation.reactnative'
version = '1.1.0'

def resolveReactNativeVersion() {
    if (rootProject.ext.has("reactNativeVersion")) {
        return rootProject.ext.get("reactNativeVersion")
    }

    def packageJsonCandidates = [
        file("$rootDir/../node_modules/react-native/package.json"),
        file("$rootDir/../../../react-native/package.json"),
    ]

    def packageJson = packageJsonCandidates.find { it.exists() }
    if (packageJson != null) {
        return new groovy.json.JsonSlurper().parseText(packageJson.text)['version']
    }

    return null
}

def reactNativeVersion = resolveReactNativeVersion()

android {
    namespace "com.cookieinformation.reactnative"
    compileSdkVersion 36

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 1
        versionName "1.1.0"
    }

    lintOptions {
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    if (reactNativeVersion != null) {
        compileOnly "com.facebook.react:react-android:${reactNativeVersion}"
    } else {
        // Resolved by the host app's React Native Gradle Plugin when autolinked.
        compileOnly "com.facebook.react:react-android"
    }
    implementation platform("androidx.compose:compose-bom:2024.12.01")
    implementation "androidx.activity:activity-compose:1.9.3"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"

    implementation "com.cookieinformation:mobileconsents:3.1.0"
    implementation "com.cookieinformation:core:1.0.0"

    implementation "androidx.compose.material3:material3"
    implementation "androidx.compose.material3:material3-window-size-class"
    implementation "androidx.compose.ui:ui"
}
