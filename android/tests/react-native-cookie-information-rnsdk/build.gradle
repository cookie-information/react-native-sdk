plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

group = 'com.cookieinformation.reactnative'
version = '1.1.0'

def reactNativeVersion = new groovy.json.JsonSlurper().parseText(
    new File(rootProject.projectDir, "../../node_modules/react-native/package.json").text
)['version']

repositories {
    google()
    mavenCentral()
}

android {
    namespace "com.cookieinformation.reactnative"
    compileSdkVersion 36

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.1.0"
    }

    sourceSets {
        main {
            java.srcDirs = ['../../src/main/java']
            manifest.srcFile '../../src/main/AndroidManifest.xml'
        }
        test {
            java.srcDirs = ['../../src/test/kotlin']
        }
    }

    lintOptions {
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
            all {
                it.useJUnitPlatform()
            }
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-android:${reactNativeVersion}"
    implementation platform("androidx.compose:compose-bom:2024.12.01")
    implementation "androidx.activity:activity-compose:1.9.3"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"

    implementation "com.cookieinformation:mobileconsents:3.1.0"
    implementation "com.cookieinformation:core:1.0.0"

    implementation "androidx.compose.material3:material3"
    implementation "androidx.compose.material3:material3-window-size-class"
    implementation "androidx.compose.ui:ui"

    testImplementation "io.kotest:kotest-runner-junit5:5.9.1"
    testImplementation "io.kotest:kotest-assertions-core:5.9.1"
    testImplementation "androidx.test:core:1.6.1"
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.junit.vintage:junit-vintage-engine:5.11.4"
    testImplementation "org.mockito:mockito-core:5.14.2"
}
